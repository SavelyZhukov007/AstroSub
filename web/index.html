<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Submind</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app single-app">
    <section class="workspace">
      <header class="topbar">
        <div class="brand">
          <span class="logo" id="railLogo"></span>
          <span class="brand-text">
            <span class="name">Submind</span>
            <span class="sub" id="brandSub">субтитры и эмоции</span>
          </span>
        </div>
        <button class="btn primary" id="btnOpen"><span data-icon="open"></span>Открыть видео</button>
        <span class="grow"></span>
        <div class="env" id="env">
          <span id="envDev" title="Устройство"><span class="dot"></span><span data-icon="chip" class="ic"></span><span id="envDevTxt">CPU</span></span>
          <span id="envFf"><span class="dot"></span>ffmpeg</span>
          <span id="envEmotion"><span class="dot"></span>EmotionAI</span>
        </div>
      </header>

      <main id="viewEditor" class="view editor single-editor">
        <div class="left single-main">
          <div class="stage" id="stage">
            <div class="empty" id="stageEmpty">
              <span data-icon="captions"></span>
              <div>Откройте видео, чтобы получить субтитры и эмоции на лицах</div>
            </div>
            <video id="video" class="hidden" playsinline></video>
            <canvas class="emotion-overlay" id="emotionOverlay"></canvas>
            <button class="stage-fs" id="btnFullscreen" title="Во весь экран"><span data-icon="fullscreen"></span></button>
            <div class="fs-caption" id="fsCaption"></div>
            <div class="fs-player" id="fsPlayer">
              <button class="iconbtn" id="fsPlay"><span data-icon="play"></span></button>
              <span class="tc" id="fsCur">00:00:00</span>
              <div class="seek fs-seek" id="fsSeek"><div class="track"></div><div class="fill" id="fsSeekFill"></div></div>
              <span class="tc" id="fsDur">00:00:00</span>
              <button class="iconbtn" id="fsMute"><span data-icon="volume"></span></button>
              <select id="fsSpeed" class="mini-select" title="Скорость">
                <option value="0.75">0.75x</option>
                <option value="1" selected>1x</option>
                <option value="1.25">1.25x</option>
                <option value="1.5">1.5x</option>
                <option value="2">2x</option>
              </select>
              <button class="iconbtn" id="fsCaptions"><span data-icon="captions"></span></button>
              <button class="iconbtn" id="fsExit"><span data-icon="close"></span></button>
            </div>

            <div class="proc hidden" id="proc">
              <div class="proc-anim">
                <span class="ring r1"></span><span class="ring r2"></span><span class="ring r3"></span>
                <span class="scan"></span>
                <span class="proc-pct" id="procPct">0%</span>
              </div>
              <div class="proc-label" id="procLabel">Подготовка...</div>
              <div class="proc-bar"><div id="procFill"></div></div>
              <div class="proc-eta" id="procEta"></div>
              <div class="proc-steps" id="procSteps"></div>
              <div class="proc-error hidden" id="procError"></div>
            </div>
          </div>

          <div class="live-cap" id="liveCap"></div>
          <div class="transport">
            <button class="iconbtn" id="btnPlay"><span data-icon="play"></span></button>
            <span class="tc" id="tcCur">00:00:00</span>
            <div class="seek" id="seek"><div class="track"></div><div class="fill" id="seekFill"></div></div>
            <span class="tc tcr" id="tcDur">00:00:00</span>
          </div>
          <div class="transcript scroll" id="transcript">
            <p class="muted pad">Субтитры появятся здесь после обработки.</p>
          </div>
        </div>
      </main>

      <footer class="statusbar">
        <span id="statusText">Готов</span>
        <span class="grow"></span>
        <div class="progress hidden" id="progressBar"><div></div></div>
        <span id="modelInfo"></span>
      </footer>
    </section>
  </div>

  <div class="toast hidden" id="toast">
    <div class="toast-title">Ошибка</div>
    <div class="toast-text" id="toastText"></div>
    <button class="iconbtn" id="toastClose"><span data-icon="close"></span></button>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
